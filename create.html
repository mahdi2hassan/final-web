<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب Admin - Plus Math</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #2d4258;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
      direction: ltr;
      text-align: left;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
      line-height: 1.6;
    }
    .result.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .result.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .uid-box {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 5px;
      margin-top: 10px;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      border: 1px dashed #667eea;
    }
    .note {
      background: #fff3cd;
      border: 1px solid #ffc107;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 13px;
      color: #856404;
    }
    .note strong {
      display: block;
      margin-bottom: 5px;
      color: #333;
    }
    .copy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 5px;
    }
    .copy-btn:active {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 إنشاء حساب Admin</h1>
    <p class="subtitle">Plus Mathematics Platform</p>
    
    <form id="createForm">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="admin@plusmath.com" required>
      </div>
      
      <div class="form-group">
        <label>كلمة المرور (6 أحرف على الأقل)</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6">
      </div>
      
      <div class="form-group">
        <label>نوع الحساب</label>
        <select id="accountType" required>
          <option value="admin">Admin (صلاحيات كاملة)</option>
          <option value="supervisor">Supervisor (مشرف)</option>
        </select>
      </div>
      
      <button type="submit" class="btn" id="submitBtn">إنشاء الحساب</button>
    </form>
    
    <div id="result" class="result"></div>
    
    <div class="note">
      <strong>⚠️ ملاحظة مهمة:</strong>
      بعد إنشاء الحساب، سيتم إضافة UID تلقائياً في Firestore collection المناسب.
      احفظ بيانات تسجيل الدخول في مكان آمن!
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
      apiKey:"AIzaSyB2ziv39cpnOyyfamabO1ujhU-1CyIdRaE",
      authDomain:"plusinmath-web.firebaseapp.com",
      projectId:"plusinmath-web",
      storageBucket:"plusinmath-web.firebasestorage.app",
      messagingSenderId:"444492731461",
      appId:"1:444492731461:web:14529f08d9ccf047dabf2c"
    };

    const app = initializeApp(cfg);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById('createForm');
    const resultEl = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const accountType = document.getElementById('accountType').value;
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'جاري الإنشاء...';
      resultEl.style.display = 'none';
      
      try {
        // إنشاء الحساب في Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // إضافة UID في Firestore
        const collectionName = accountType === 'admin' ? 'admins' : 'supervisors';
        await setDoc(doc(db, collectionName, user.uid), {
          email: email,
          createdAt: new Date().toISOString(),
          role: accountType
        });
        
        // عرض النتيجة
        resultEl.className = 'result success';
        resultEl.style.display = 'block';
        resultEl.innerHTML = `
          <strong>✅ تم إنشاء الحساب بنجاح!</strong><br><br>
          <strong>البريد الإلكتروني:</strong> ${email}<br>
          <strong>النوع:</strong> ${accountType === 'admin' ? 'Admin' : 'Supervisor'}<br>
          <div class="uid-box">
            <strong>UID:</strong> ${user.uid}
            <button class="copy-btn" onclick="navigator.clipboard.writeText('${user.uid}');this.textContent='✓ تم النسخ'">نسخ UID</button>
          </div>
          <br>
          <small>يمكنك الآن تسجيل الدخول باستخدام هذا الحساب في content-manager.html</small>
        `;
        
        // إعادة تعيين النموذج
        form.reset();
        
      } catch (error) {
        console.error('Error:', error);
        
        let errorMsg = 'حدث خطأ غير متوقع';
        if (error.code === 'auth/email-already-in-use') {
          errorMsg = 'هذا البريد الإلكتروني مستخدم بالفعل';
        } else if (error.code === 'auth/invalid-email') {
          errorMsg = 'البريد الإلكتروني غير صحيح';
        } else if (error.code === 'auth/weak-password') {
          errorMsg = 'كلمة المرور ضعيفة جداً (يجب أن تكون 6 أحرف على الأقل)';
        } else if (error.code === 'permission-denied') {
          errorMsg = 'خطأ في الصلاحيات - تأكد من إعدادات Firestore Rules';
        }
        
        resultEl.className = 'result error';
        resultEl.style.display = 'block';
        resultEl.innerHTML = `<strong>❌ فشل إنشاء الحساب</strong><br>${errorMsg}<br><br><small>التفاصيل: ${error.message}</small>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'إنشاء الحساب';
      }
    });
  </script>
</body>
</html>
