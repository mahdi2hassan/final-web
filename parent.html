<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>حساب ولي الأمر — Plus Mathematics</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060f;--card:rgba(12,18,40,0.85);--border:rgba(74,127,212,0.2);--border2:rgba(74,127,212,0.1);
  --blue:#4a7fd4;--navy:#1a3270;--gold:#c9a84c;--gold2:#f0d080;
  --text:#eef2ff;--muted:#6a7a9e;--error:#ff4d6d;--success:#00d68f;--warn:#f5a623;
  --input:rgba(8,13,28,0.75);
}
html,body{min-height:100dvh;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(74,127,212,0.05)1px,transparent 1px),linear-gradient(90deg,rgba(74,127,212,0.05)1px,transparent 1px);
  background-size:55px 55px}
.o1{position:fixed;width:400px;height:400px;background:rgba(26,50,112,0.5);top:-100px;left:-120px;border-radius:50%;filter:blur(100px);z-index:0}
.o2{position:fixed;width:300px;height:300px;background:rgba(130,90,15,0.35);bottom:-80px;right:-60px;border-radius:50%;filter:blur(100px);z-index:0}

.wrapper{position:relative;z-index:10;width:100%;max-width:420px}
.auth-card{background:var(--card);backdrop-filter:blur(24px);border:1px solid var(--border);
  border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.65);
  animation:cardIn .5s cubic-bezier(.22,1,.36,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.auth-header{padding:24px 28px 16px;text-align:center;
  background:linear-gradient(180deg,rgba(26,50,112,0.25),transparent);border-bottom:1px solid var(--border2)}
.auth-header .ico{font-size:40px;margin-bottom:10px}
.auth-header h1{font-size:18px;font-weight:900;margin-bottom:4px}
.auth-header p{font-size:12px;color:var(--muted)}

.auth-body{padding:20px 24px}

.step{display:none}
.step.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:13px 14px;background:var(--input);border:1.5px solid var(--border2);
  border-radius:12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:15px;outline:none;
  transition:border-color .2s;appearance:none}
.field input:focus{border-color:var(--blue)}

.btn{width:100%;padding:13px;border:none;border-radius:12px;cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;
  background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 6px 20px rgba(74,127,212,0.3);transition:all .2s;position:relative}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(74,127,212,0.38)}
.btn:disabled{opacity:.7;transform:none;cursor:not-allowed}
.btn .spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn.loading .btn-text{display:none}
.btn.loading .spin{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

.msg{font-size:12px;padding:8px 10px;border-radius:8px;margin-bottom:10px;display:none;
  align-items:center;gap:6px}
.msg.show{display:flex}
.msg.error{background:rgba(255,77,109,0.1);color:var(--error);border:1px solid rgba(255,77,109,0.2)}
.msg.success{background:rgba(0,214,143,0.08);color:var(--success);border:1px solid rgba(0,214,143,0.2)}

.divider{text-align:center;font-size:12px;color:var(--muted);margin:12px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--border2)}
.divider::before{right:0}.divider::after{left:0}

/* Profile card */
.prof-card{background:rgba(74,127,212,0.06);border:1px solid var(--border2);border-radius:13px;
  padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
.prof-av{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--navy));
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.prof-info h3{font-size:15px;font-weight:900;margin-bottom:2px}
.prof-info p{font-size:11px;color:var(--muted)}

.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px}
.info-row:last-child{border:none;padding-bottom:0}
.info-row .lbl{color:var(--muted);font-weight:600}
.info-row .val{font-weight:700}

.prog-item{margin-bottom:12px}
.prog-item:last-child{margin-bottom:0}
.prog-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.prog-head .name{color:var(--muted);font-weight:600}
.prog-head .cnt{font-weight:700}
.prog-bar{height:7px;background:rgba(74,127,212,0.08);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.pf-blue{background:linear-gradient(90deg,var(--blue),var(--navy))}
.pf-gold{background:linear-gradient(90deg,var(--gold),#8a6010)}
.pf-ok{background:linear-gradient(90deg,var(--success),#006040)}

.section-title{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.5px;
  text-transform:uppercase;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border2)}

.sub-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.sub-badge.ok{background:rgba(0,214,143,0.1);color:var(--success);border:1px solid rgba(0,214,143,0.2)}
.sub-badge.err{background:rgba(255,77,109,0.1);color:var(--error);border:1px solid rgba(255,77,109,0.2)}
.sub-badge.warn{background:rgba(245,166,35,0.1);color:var(--warn);border:1px solid rgba(245,166,35,0.2)}

.back-btn{width:100%;padding:10px;border:1px solid var(--border);border-radius:12px;cursor:pointer;
  background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;margin-top:8px}
.back-btn:hover{border-color:var(--blue);color:var(--text)}

.card-footer{padding:12px 24px;border-top:1px solid var(--border2);text-align:center;font-size:11px;color:var(--muted)}
.card-footer a{color:var(--blue);text-decoration:none}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(10,15,34,.97);border:1px solid var(--border);border-radius:10px;
  padding:9px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;
  transition:transform .3s cubic-bezier(.22,1,.36,1);z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{color:var(--success)}.toast.err{color:var(--error)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="o1"></div>
<div class="o2"></div>

<div class="wrapper">
<div class="auth-card">
  <div class="auth-header">
    <div class="ico">👨‍👧</div>
    <h1>حساب ولي الأمر</h1>
    <p>تابع تقدم ابنك في Plus Mathematics</p>
  </div>

  <div class="auth-body">

    <!-- ══ STEP: LOGIN ══ -->
    <div class="step active" id="step-login">
      <div class="field">
        <label>رقم هاتفك (ولي الأمر)</label>
        <input type="tel" id="par-phone" placeholder="01xxxxxxxxx" maxlength="11" inputmode="numeric"
          oninput="this.value=this.value.replace(/\D/g,'')"/>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="par-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doParLogin()"/>
      </div>
      <div class="msg" id="login-msg"></div>
      <button class="btn" id="login-btn" onclick="doParLogin()">
        <span class="btn-text">دخول</span>
        <div class="spin"></div>
      </button>
      <div class="divider">حساب جديد؟</div>
      <button class="btn" id="reg-btn" onclick="showStep('step-register')"
        style="background:transparent;border:1px solid var(--border);color:var(--muted);box-shadow:none">
        <span class="btn-text">إنشاء حساب ولي أمر</span>
      </button>
    </div>

    <!-- ══ STEP: REGISTER ══ -->
    <div class="step" id="step-register">
      <div class="field">
        <label>اسمك</label>
        <input type="text" id="par-reg-name" placeholder="اسم ولي الأمر"/>
      </div>
      <div class="field">
        <label>رقم هاتفك</label>
        <input type="tel" id="par-reg-phone" placeholder="01xxxxxxxxx" maxlength="11" inputmode="numeric"
          oninput="this.value=this.value.replace(/\D/g,'')"/>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="par-reg-pass" placeholder="٦ أحرف على الأقل" minlength="6"/>
      </div>
      <div class="msg" id="reg-msg"></div>
      <button class="btn" id="reg-submit-btn" onclick="doParRegister()">
        <span class="btn-text">إنشاء حساب</span>
        <div class="spin"></div>
      </button>
      <button class="back-btn" onclick="showStep('step-login')">← رجوع</button>
    </div>

    <!-- ══ STEP: SEARCH STUDENT ══ -->
    <div class="step" id="step-search">
      <div style="margin-bottom:14px;font-size:13px;color:var(--muted)">
        أهلاً <strong id="par-welcome-name" style="color:var(--text)">—</strong> 👋<br/>
        ادخل رقم تليفون الطالب لتشوف تقدمه
      </div>
      <div class="field">
        <label>رقم تليفون الطالب</label>
        <input type="tel" id="student-phone" placeholder="01xxxxxxxxx" maxlength="11" inputmode="numeric"
          oninput="this.value=this.value.replace(/\D/g,'')" onkeydown="if(event.key==='Enter')searchStudent()"/>
      </div>
      <div class="msg" id="search-msg"></div>
      <button class="btn" id="search-btn" onclick="searchStudent()">
        <span class="btn-text">🔍 عرض التقدم</span>
        <div class="spin"></div>
      </button>
      <button class="back-btn" onclick="parSignOut()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        تسجيل الخروج
      </button>
    </div>

    <!-- ══ STEP: STUDENT PROGRESS ══ -->
    <div class="step" id="step-progress">
      <!-- Student header -->
      <div class="prof-card">
        <div class="prof-av" id="stu-av">ط</div>
        <div class="prof-info">
          <h3 id="stu-name">—</h3>
          <p id="stu-grade">—</p>
        </div>
      </div>

      <!-- Subscription status -->
      <div class="section-title">الاشتراك</div>
      <div style="margin-bottom:12px">
        <div class="info-row">
          <span class="lbl">الحالة</span>
          <span class="val" id="stu-sub-status"></span>
        </div>
        <div class="info-row">
          <span class="lbl">الكود</span>
          <span class="val" id="stu-code" style="font-family:monospace;color:var(--gold2);letter-spacing:1px">—</span>
        </div>
        <div class="info-row">
          <span class="lbl">ينتهي</span>
          <span class="val" id="stu-exp">—</span>
        </div>
        <div class="info-row">
          <span class="lbl">المتبقي</span>
          <span class="val" id="stu-days">—</span>
        </div>
        <!-- Sub progress bar -->
        <div style="height:5px;background:rgba(74,127,212,0.08);border-radius:3px;overflow:hidden;margin-top:8px">
          <div id="stu-sub-bar" style="height:100%;border-radius:3px;background:linear-gradient(90deg,var(--success),#006040);width:0%;transition:width 1s"></div>
        </div>
      </div>

      <!-- Academic progress -->
      <div class="section-title">التقدم الأكاديمي</div>
      <div class="prog-item">
        <div class="prog-head"><span class="name">▶ فيديوهات الشرح</span><span class="cnt" id="stu-v-cnt">0/0</span></div>
        <div class="prog-bar"><div class="prog-fill pf-blue" id="stu-v-bar" style="width:0%"></div></div>
      </div>
      <div class="prog-item">
        <div class="prog-head"><span class="name">✍ الامتحانات</span><span class="cnt" id="stu-e-cnt">0/0</span></div>
        <div class="prog-bar"><div class="prog-fill pf-gold" id="stu-e-bar" style="width:0%"></div></div>
      </div>
      <div class="prog-item">
        <div class="prog-head"><span class="name">📋 الواجبات</span><span class="cnt" id="stu-h-cnt">0/0</span></div>
        <div class="prog-bar"><div class="prog-fill pf-ok" id="stu-h-bar" style="width:0%"></div></div>
      </div>

      <div class="section-title" style="margin-top:14px"></div>
      <button class="back-btn" onclick="showStep('step-search')">← بحث عن طالب آخر</button>
      <button class="back-btn" onclick="parSignOut()" style="margin-top:6px;color:var(--error);border-color:rgba(255,77,109,0.2)">تسجيل الخروج</button>
    </div>

  </div>

  <div class="card-footer">
    <a href="index.html">الصفحة الرئيسية</a> ·
    <a href="plus-math-auth.html">حساب الطالب</a>
  </div>
</div>
</div>

<div class="toast" id="toast"><span id="tMsg"></span></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyB2ziv39cpnOyyfamabO1ujhU-1CyIdRaE",
  authDomain:"plusinmath-web.firebaseapp.com",
  projectId:"plusinmath-web",
  storageBucket:"plusinmath-web.firebasestorage.app",
  messagingSenderId:"444492731461",
  appId:"1:444492731461:web:14529f08d9ccf047dabf2c"
});
const auth = firebase.auth();
const db   = firebase.firestore();

// ── Helpers ──
function phoneToEmail(p){ return '20'+p.replace(/\D/g,'').replace(/^0/,'')+'@plusparent.edu'; }
function showStep(id){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showMsg(id,txt,type){
  var el=document.getElementById(id); if(!el)return;
  el.textContent=txt; el.className='msg show '+type;
}
function setLoad(btn,state){ btn.disabled=state; btn.classList.toggle('loading',state); }
function fmt(ts){ return ts?.toDate?ts.toDate().toLocaleDateString('ar-EG'):ts?new Date(ts).toLocaleDateString('ar-EG'):'—'; }

let tTimer;
function toast(msg,type='ok'){
  var t=document.getElementById('toast');
  t.className='toast '+type+' show';
  document.getElementById('tMsg').textContent=msg;
  clearTimeout(tTimer);
  tTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

// ── Auth state ──
auth.onAuthStateChanged(function(user){
  if(user){
    // Check if parent account
    db.collection('parents').doc(user.uid).get().then(function(pd){
      if(pd.exists){
        document.getElementById('par-welcome-name').textContent = pd.data().name||'ولي الأمر';
        showStep('step-search');
      } else {
        // Not a parent account — sign out
        auth.signOut().then(()=>showStep('step-login'));
      }
    });
  } else {
    showStep('step-login');
  }
});

// ── REGISTER PARENT ──
function doParRegister(){
  var name  = document.getElementById('par-reg-name').value.trim();
  var phone = document.getElementById('par-reg-phone').value.trim();
  var pass  = document.getElementById('par-reg-pass').value;
  if(!name)  { showMsg('reg-msg','ادخل اسمك','error'); return; }
  if(phone.length<10){ showMsg('reg-msg','رقم الهاتف غير صحيح','error'); return; }
  if(pass.length<6)  { showMsg('reg-msg','كلمة المرور قصيرة — 6 أحرف على الأقل','error'); return; }
  var btn = document.getElementById('reg-submit-btn');
  setLoad(btn,true);
  var email = phoneToEmail(phone);
  auth.createUserWithEmailAndPassword(email, pass)
    .then(function(cred){
      return db.collection('parents').doc(cred.user.uid).set({
        name, phone, email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    })
    .then(function(){
      document.getElementById('par-welcome-name').textContent = name;
      showStep('step-search');
      toast('تم إنشاء حسابك ✓');
    })
    .catch(function(e){
      var msgs = {
        'auth/email-already-in-use':'الرقم ده مسجل بالفعل — ادخل أو غيّر الرقم',
        'auth/weak-password':'كلمة المرور ضعيفة'
      };
      showMsg('reg-msg', msgs[e.code]||'خطأ: '+e.message,'error');
    })
    .finally(function(){ setLoad(btn,false); });
}

// ── LOGIN PARENT ──
function doParLogin(){
  var phone = document.getElementById('par-phone').value.trim();
  var pass  = document.getElementById('par-pass').value;
  if(phone.length<10){ showMsg('login-msg','رقم الهاتف غير صحيح','error'); return; }
  if(!pass){ showMsg('login-msg','ادخل كلمة المرور','error'); return; }
  var btn = document.getElementById('login-btn');
  setLoad(btn,true);
  var email = phoneToEmail(phone);
  auth.signInWithEmailAndPassword(email, pass)
    .catch(function(e){
      var msgs = {
        'auth/user-not-found':'الحساب مش موجود — سجل حساب جديد',
        'auth/wrong-password':'كلمة المرور غلط',
        'auth/invalid-credential':'بيانات الدخول غلط'
      };
      showMsg('login-msg', msgs[e.code]||'بيانات الدخول غلط','error');
      setLoad(btn,false);
    });
}

// ── SEARCH STUDENT ──
async function searchStudent(){
  var phone = document.getElementById('student-phone').value.trim();
  if(phone.length<10){ showMsg('search-msg','ادخل رقم صحيح','error'); return; }
  var btn = document.getElementById('search-btn');
  setLoad(btn,true);
  document.getElementById('search-msg').className='msg';
  try{
    // Find student by phone
    var snap = await db.collection('users').where('phone','==',phone).limit(1).get();
    if(snap.empty){
      showMsg('search-msg','مش لاقي طالب بالرقم ده ❌','error');
      setLoad(btn,false); return;
    }
    var stu = {id:snap.docs[0].id, ...snap.docs[0].data()};
    // Load progress
    var pr = await db.collection('progress').doc(stu.id).get();
    var progress = pr.exists ? pr.data() : {};
    var gradeKey = stu.gradeKey||'';
    var gProg = progress[gradeKey]||{};
    var doneV = (gProg.videos||[]).length;
    var doneE = (gProg.exams||[]).length;
    var doneH = (gProg.homework||[]).length;
    // Load content counts
    var totalV=0,totalE=0,totalH=0;
    if(gradeKey){
      try{
        var [vs,es,hs] = await Promise.all([
          db.collection('content').doc(gradeKey).collection('videos').get(),
          db.collection('content').doc(gradeKey).collection('exams').get(),
          db.collection('content').doc(gradeKey).collection('homework').get()
        ]);
        totalV=vs.size; totalE=es.size; totalH=hs.size;
      }catch(e){}
    }
    // Fill UI
    document.getElementById('stu-av').textContent   = (stu.name||'ط').slice(0,2);
    document.getElementById('stu-name').textContent  = stu.name||'—';
    document.getElementById('stu-grade').textContent = stu.grade||'—';
    document.getElementById('stu-code').textContent  = stu.subscriptionCode||'—';
    document.getElementById('stu-exp').textContent   = fmt(stu.expiresAt);
    // Days & status
    var now = new Date();
    var daysLeft=0, pct=0;
    if(stu.expiresAt){
      var exp = stu.expiresAt.toDate?stu.expiresAt.toDate():new Date(stu.expiresAt);
      daysLeft = Math.max(0,Math.ceil((exp-now)/86400000));
      var start = stu.activatedAt?.toDate?stu.activatedAt.toDate():new Date(stu.activatedAt||now);
      var total = Math.max(1,Math.ceil((exp-start)/86400000));
      pct = Math.round(daysLeft/total*100);
    }
    var daysEl = document.getElementById('stu-days');
    daysEl.textContent = daysLeft+' يوم';
    daysEl.style.color = daysLeft<=3?'var(--error)':daysLeft<=7?'var(--warn)':'var(--success)';
    var statusEl = document.getElementById('stu-sub-status');
    if(!stu.subscriptionActive || daysLeft===0){
      statusEl.innerHTML = '<span class="sub-badge err">⛔ منتهي</span>';
    } else if(daysLeft<=7){
      statusEl.innerHTML = '<span class="sub-badge warn">⚠️ ينتهي قريباً</span>';
    } else {
      statusEl.innerHTML = '<span class="sub-badge ok">✅ نشط</span>';
    }
    setTimeout(function(){
      document.getElementById('stu-sub-bar').style.width = pct+'%';
      // Progress bars
      function setBar(barId,cntId,done,total){
        var p=total?Math.round(done/total*100):0;
        document.getElementById(barId).style.width=p+'%';
        document.getElementById(cntId).textContent=done+'/'+total;
      }
      setBar('stu-v-bar','stu-v-cnt',doneV,totalV);
      setBar('stu-e-bar','stu-e-cnt',doneE,totalE);
      setBar('stu-h-bar','stu-h-cnt',doneH,totalH);
    },300);
    showStep('step-progress');
  }catch(e){ showMsg('search-msg','خطأ: '+e.message,'error'); }
  setLoad(btn,false);
}

function parSignOut(){
  auth.signOut().then(()=>showStep('step-login'));
}
</script>
