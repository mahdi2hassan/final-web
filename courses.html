<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plus Mathematics – الكورسات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#04060f;--s1:rgba(8,13,28,0.9);--s2:rgba(12,18,40,0.75);
      --b1:rgba(74,127,212,0.22);--b2:rgba(74,127,212,0.12);
      --blue:#4a7fd4;--navy:#1a3270;--gold:#c9a84c;--gold2:#f0d080;
      --text:#eef2ff;--muted:#6a7a9e;--ok:#00d68f;--err:#ff4d6d;--purple:#a78bfa;
    }
    html,body{min-height:100dvh;overflow-x:hidden}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text)}
    .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(rgba(74,127,212,0.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(74,127,212,0.04) 1px,transparent 1px);background-size:44px 44px}
    .orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
    .o1{width:400px;height:400px;background:rgba(26,50,112,0.45);top:-100px;left:-100px}
    .o2{width:300px;height:300px;background:rgba(110,75,10,0.3);bottom:-60px;right:-60px}

    #loadingScreen{position:fixed;inset:0;z-index:200;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .loader{width:44px;height:44px;border:3px solid rgba(74,127,212,0.2);
      border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    nav{position:sticky;top:0;z-index:50;height:58px;
      display:none;align-items:center;gap:12px;padding:0 24px;
      background:var(--s1);backdrop-filter:blur(20px);border-bottom:1px solid var(--b2)}
    #mainContent{display:none}
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="o1 orb"></div>
<div class="o2 orb"></div>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="loader"></div>
  <p>جاري التحقق من حسابك...</p>
</div>

<!-- Navigation (يظهر بعد التحقق) -->
<nav id="navbar">
  <div>Plus Mathematics</div>
  <div style="margin-right:auto">أهلاً، <strong id="userName">—</strong></div>
</nav>

<!-- Main Content (يظهر بعد التحقق) -->
<main id="mainContent" style="padding:20px;color:#eef2ff">
  <h1>الصفحة الرئيسية</h1>
  <p>تم تسجيل الدخول بنجاح وتم عرض المحتوى.</p>
  <p id="debugInfo">معلومات التصحيح ستظهر هنا</p>
</main>

<!-- Firebase Compat (v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ────────────────────────────────────────────────
//  المتغيرات العامة
// ────────────────────────────────────────────────
let _user = null;
let _userData = null;
const debug = document.getElementById('debugInfo');

// ────────────────────────────────────────────────
//  تهيئة Firebase
// ────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyB2ziv39cpnOyyfamabO1ujhU-1CyIdRaE",
  authDomain:        "plusinmath-web.firebaseapp.com",
  projectId:         "plusinmath-web",
  storageBucket:     "plusinmath-web.firebasestorage.app",
  messagingSenderId: "444492731461",
  appId:             "1:444492731461:web:14529f08d9ccf047dabf2c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

console.log("[INIT] Firebase تم تهيئته");

// ────────────────────────────────────────────────
//  مراقب حالة تسجيل الدخول
// ────────────────────────────────────────────────
auth.onAuthStateChanged((user) => {
  console.log("[AUTH] onAuthStateChanged → user موجود؟", !!user);

  if (!user) {
    console.log("[AUTH] لا يوجد مستخدم → يفترض الانتقال لصفحة تسجيل الدخول");
    debug.innerHTML = "لا يوجد مستخدم مسجل → يجب الانتقال إلى صفحة تسجيل الدخول";
    // window.location.href = 'plus-math-auth.html';   ← ألغِ التعليق إذا أردت
    return;
  }

  _user = user;
  console.log("[AUTH] UID:", user.uid, "| Email:", user.email || "غير متوفر");

  debug.innerHTML = `مسجل دخول → UID: ${user.uid}<br>جاري جلب بيانات المستخدم...`;

  // جلب بيانات المستخدم
  db.collection('users').doc(user.uid).get()
    .then((doc) => {
      console.log("[FIRESTORE] هل الدكيومنت موجود؟", doc.exists);

      if (!doc.exists) {
        console.error("[FIRESTORE] → الدكيومنت غير موجود");
        debug.innerHTML += "<br>× خطأ: حسابك غير موجود في قاعدة البيانات";
        return;
      }

      const data = doc.data();
      _userData = data;
      console.log("[FIRESTORE] البيانات:", data);

      debug.innerHTML += `<br>تم جلب البيانات:<br>
        • الاسم: ${data.name || 'غير محدد'}<br>
        • subscriptionActive: ${data.subscriptionActive}<br>
        • expiresAt: ${data.expiresAt ? data.expiresAt.toDate?.().toISOString() : 'غير موجود'}`;

      // ── التحقق الأساسي ──
      if (!data.subscriptionActive) {
        console.warn("[CHECK] subscriptionActive = false");
        debug.innerHTML += "<br>× الاشتراك غير مفعّل";
        return;
      }

      // عرض الصفحة الرئيسية
      console.log("[SUCCESS] كل الشروط تمت → عرض المحتوى");
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('navbar').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'block';

      document.getElementById('userName').textContent = data.name?.split(' ')[0] || 'طالب';
      debug.innerHTML += "<br><strong style='color:#00d68f'>✓ تم عرض الصفحة بنجاح</strong>";
    })
    .catch((err) => {
      console.error("[FIRESTORE ERROR]", err);
      debug.innerHTML += `<br>× خطأ في الاتصال بقاعدة البيانات:<br>${err.message || err}`;
    });
});

console.log("[SCRIPT] السكريبت انتهى من التحميل");
</script>

</body>
</html>
