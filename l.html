<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plus Mathematics – داش المشرف</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root {
      --bg: #04060f;
      --s1: rgba(8,13,28,0.93);
      --s2: rgba(12,18,40,0.8);
      --blue: #4a7fd4;
      --navy: #1a3270;
      --gold2: #f0d080;
      --text: #eef2ff;
      --muted: #6a7a9e;
      --ok: #00d68f;
      --err: #ff4d6d;
      --inp: rgba(6,10,22,0.8);
    }
    html, body {
      min-height: 100dvh;
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(74,127,212,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,127,212,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
    }
    .o1 { width: 500px; height: 500px; background: rgba(26,50,112,0.4); top: -150px; right: -150px; }
    .o2 { width: 300px; height: 300px; background: rgba(110,75,10,0.25); bottom: -60px; left: -60px; }

    .screen { 
      position: fixed; inset: 0; z-index: 100; display: none; 
      align-items: center; justify-content: center; padding: 20px; background: var(--bg);
    }
    .screen.active { display: flex; }

    .card {
      background: var(--s2);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(74,127,212,0.22);
      border-radius: 22px;
      padding: 38px 34px;
      width: 100%; max-width: 380px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .card h2 {
      font-size: 1.4rem; font-weight: 900; text-align: center;
      background: linear-gradient(135deg, #fff, var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card .subtitle { font-size: 0.9rem; color: var(--muted); text-align: center; margin: 8px 0 24px; }

    .ff { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
    .ff label { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
    .ff input {
      padding: 12px 14px;
      background: var(--inp);
      border: 1.5px solid rgba(74,127,212,0.22);
      border-radius: 11px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .ff input:focus { border-color: var(--blue); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 11px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--blue), var(--navy));
      color: white;
      box-shadow: 0 5px 20px rgba(74,127,212,0.3);
      transition: all 0.15s;
    }
    .btn:hover { transform: translateY(-1px); }

    .err-msg { font-size: 0.85rem; color: var(--err); margin-top: 8px; text-align: center; display: none; }
    .err-msg.show { display: block; }

    #app { display: none; min-height: 100dvh; position: relative; z-index: 1; }
    .topbar {
      position: sticky; top: 0; z-index: 50; height: 56px;
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px;
      background: var(--s1);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(74,127,212,0.12);
    }
    .tb-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .tb-logo img { width: 28px; height: 28px; object-fit: contain; }
    .tb-logo h2 {
      font-size: 1rem; font-weight: 900;
      background: linear-gradient(135deg, #fff, var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tb-name { flex: 1; font-size: 0.9rem; font-weight: 700; color: var(--muted); }
    .tb-name strong { color: var(--text); }

    .main { padding: 24px; max-width: 900px; margin: 0 auto; }
    .welcome {
      text-align: center;
      padding: 60px 20px;
      font-size: 1.6rem;
      color: var(--text);
    }
    .welcome span { color: var(--blue); font-weight: bold; }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="o1 orb"></div>
<div class="o2 orb"></div>

<!-- شاشة تسجيل الدخول (اسم فقط) -->
<div class="screen active" id="screenName">
  <div class="card">
    <h2>مرحباً بك</h2>
    <p class="subtitle">داش المشرف – أدخل اسمك للمتابعة</p>

    <div class="ff">
      <label>اسم المشرف</label>
      <input type="text" id="inpName" placeholder="مثال: أحمد سالم" maxlength="40"
             onkeydown="if(event.key==='Enter') goToDashboard()"/>
    </div>

    <button class="btn" onclick="goToDashboard()">دخول</button>

    <div class="err-msg" id="nameErr">من فضلك أدخل اسمك</div>
  </div>
</div>

<!-- الداشبورد الرئيسي -->
<div id="app">
  <div class="topbar">
    <a href="#" class="tb-logo">
      <img src="https://plusedu.vercel.app/store/1/fonts/221.png" alt="Plus" onerror="this.style.display='none'"/>
      <h2>Plus Mathematics</h2>
    </a>
    <div class="tb-name">مشرف: <strong id="tbName">—</strong></div>
    <div style="margin-left:auto;">
      <button class="btn" style="width:auto; padding:8px 16px; font-size:0.9rem;"
              onclick="doLogout()">خروج</button>
    </div>
  </div>

  <div class="main">
    <div class="welcome">
      مرحباً يا <span id="welcomeName">—</span> 👋<br>
      <div style="margin-top:20px; font-size:1.1rem; color:var(--muted);">
        داش المشرف جاهز للإدارة
      </div>
    </div>

    <!-- هنا تضع باقي المحتوى الذي تريده (إضافة فيديوهات، امتحانات، واجبات، قوائم الصفوف...) -->
  </div>
</div>

<script>
// ──── المتغيرات ────
let currentName = '';

// ──── الدوال الأساسية ────
function goToDashboard() {
  const name = document.getElementById('inpName').value.trim();
  if (!name) {
    document.getElementById('nameErr').classList.add('show');
    return;
  }

  currentName = name;
  localStorage.setItem('supervisorName', name);

  document.getElementById('tbName').textContent = name;
  document.getElementById('welcomeName').textContent = name;

  document.querySelector('#screenName').classList.remove('active');
  document.querySelector('#app').style.display = 'block';
}

function doLogout() {
  localStorage.removeItem('supervisorName');
  currentName = '';
  document.querySelector('#app').style.display = 'none';
  document.querySelector('#screenName').classList.add('active');
  document.getElementById('inpName').value = '';
}

// ──── التحميل التلقائي عند فتح الصفحة ────
window.addEventListener('load', () => {
  const saved = localStorage.getItem('supervisorName');
  if (saved) {
    currentName = saved;
    document.getElementById('tbName').textContent = saved;
    document.getElementById('welcomeName').textContent = saved;
    document.querySelector('#screenName').classList.remove('active');
    document.querySelector('#app').style.display = 'block';
  }
});
</script>

</body>
</html>
