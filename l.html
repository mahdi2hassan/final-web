<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plus Mathematics – داش المشرف</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060f;--s1:rgba(8,13,28,0.93);--s2:rgba(12,18,40,0.8);--s3:rgba(16,24,52,0.6);
  --b1:rgba(74,127,212,0.22);--b2:rgba(74,127,212,0.12);
  --blue:#4a7fd4;--navy:#1a3270;--gold:#c9a84c;--gold2:#f0d080;
  --text:#eef2ff;--muted:#6a7a9e;--muted2:#4a5a7e;
  --ok:#00d68f;--err:#ff4d6d;--warn:#f5a623;--purple:#a78bfa;
  --inp:rgba(6,10,22,0.8);--r:14px;
}
html,body{min-height:100dvh;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text)}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(74,127,212,0.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(74,127,212,0.04) 1px,transparent 1px);background-size:44px 44px}
.orb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0}
.o1{width:500px;height:500px;background:rgba(26,50,112,0.4);top:-150px;right:-150px}
.o2{width:300px;height:300px;background:rgba(110,75,10,0.25);bottom:-60px;left:-60px}

/* screens + card + form fields + buttons + topbar + welcome-banner + grade cards + tabs + content cards + upload + toast */
.screen{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.screen.active{display:flex}
.card{background:var(--s2);backdrop-filter:blur(24px);border:1px solid var(--b1);border-radius:22px;padding:clamp(26px,5vw,38px) clamp(20px,5vw,34px);width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,0.6);animation:popIn .45s cubic-bezier(.22,1,.36,1) both}
@keyframes popIn{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
.card-logo{width:54px;height:54px;object-fit:contain;display:block;margin:0 auto 12px;filter:drop-shadow(0 4px 14px rgba(74,127,212,.5))}
.card-logo-fallback{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--navy));display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px}
.card h2{font-size:17px;font-weight:900;text-align:center;background:linear-gradient(135deg,#fff,var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card .subtitle{font-size:11px;color:var(--muted);text-align:center;margin:4px 0 24px}
.ff{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.ff label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.ff input{padding:12px 14px;background:var(--inp);border:1.5px solid var(--b1);border-radius:11px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%}
.ff input:focus{border-color:var(--blue)}
.btn{width:100%;padding:13px;border:none;border-radius:11px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;margin-top:4px}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn.primary{background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;box-shadow:0 5px 20px rgba(74,127,212,.3)}
.btn.ok{background:linear-gradient(135deg,var(--ok),#006040);color:#fff;box-shadow:0 5px 20px rgba(0,214,143,.2)}
.topbar{position:sticky;top:0;z-index:50;height:56px;display:flex;align-items:center;gap:12px;padding:0 clamp(14px,4vw,24px);background:var(--s1);backdrop-filter:blur(20px);border-bottom:1px solid var(--b2)}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.tb-logo img{width:28px;height:28px;object-fit:contain}
.tb-logo h2{font-size:13px;font-weight:900;background:linear-gradient(135deg,#fff,var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb-name{flex:1;font-size:13px;font-weight:700;color:var(--muted)}
.tb-name strong{color:var(--text)}
.tb-acts{display:flex;gap:8px;margin-right:auto}
.tbtn{padding:7px 13px;border:1px solid var(--b1);border-radius:9px;background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;text-decoration:none;white-space:nowrap}
.tbtn:hover{border-color:var(--blue);color:var(--text)}
.tbtn.danger:hover{border-color:var(--err);color:var(--err)}
.tbtn svg,.btn svg{width:13px;height:13px}
.welcome-banner{background:linear-gradient(135deg,rgba(74,127,212,0.12),rgba(26,50,112,0.15));border:1px solid var(--b1);border-radius:16px;padding:18px 20px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.wb-avatar{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--blue),var(--navy));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.wb-info h3{font-size:15px;font-weight:900}
.wb-info p{font-size:12px;color:var(--muted);margin-top:3px}
.stage-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.stage-sec{background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:14px 16px}
.stage-lbl{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.grade-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gc{background:rgba(8,13,28,0.5);border:1.5px solid var(--b2);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .22s cubic-bezier(.22,1,.36,1)}
.gc:hover{transform:translateY(-2px);border-color:var(--b1);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.gc.sel{border-color:var(--blue);background:linear-gradient(135deg,rgba(74,127,212,.15),rgba(26,50,112,.2));box-shadow:0 4px 18px rgba(74,127,212,.25)}
.gc.sel::before{content:'';display:block;height:2px;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:2px;margin-bottom:8px}
.gc-num{font-size:22px;font-weight:900;background:linear-gradient(135deg,#fff,var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.gc-name{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tbtn.on{background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(74,127,212,.3)}
.ccard{background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:18px;margin-bottom:14px}
.ccard-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--b2)}
.ccard-head h3{font-size:14px;font-weight:800;flex:1;display:flex;align-items:center;gap:6px}
.ccard-head h3 svg{width:14px;height:14px;color:var(--blue)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:540px){.fgrid{grid-template-columns:1fr}}
.ffield{display:flex;flex-direction:column;gap:5px}
.ffield label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.ffield input,.ffield select,.ffield textarea{padding:10px 12px;background:var(--inp);border:1.5px solid var(--b1);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:border-color .2s;appearance:none;width:100%;resize:vertical}
.ffield input:focus,.ffield select:focus,.ffield textarea:focus{border-color:var(--blue)}
.ffield.full{grid-column:1/-1}
.upload-zone{border:2px dashed var(--b1);border-radius:12px;padding:22px 16px;text-align:center;cursor:pointer;transition:all .25s;position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:rgba(74,127,212,.05)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone-ico{width:40px;height:40px;border-radius:12px;background:rgba(74,127,212,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.upload-zone-ico svg{width:20px;height:20px;color:var(--blue)}
.upload-zone h4{font-size:13px;font-weight:700;margin-bottom:3px}
.upload-zone p{font-size:11px;color:var(--muted)}
.items{display:flex;flex-direction:column;gap:8px}
.item{background:rgba(8,13,28,.5);border:1px solid var(--b2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;transition:all .2s}
.item:hover{border-color:var(--b1)}
.item-num{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--navy));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.item-acts{display:flex;gap:5px;flex-shrink:0}
.ia{width:28px;height:28px;border-radius:8px;border:1px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--muted)}
.ia:hover{border-color:var(--blue);background:rgba(74,127,212,.1);color:var(--text)}
.ia.del:hover{border-color:var(--err);background:rgba(255,77,109,.1);color:var(--err)}
.ia svg{width:12px;height:12px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(10,15,34,.97);backdrop-filter:blur(16px);border:1px solid var(--b1);border-radius:11px;padding:10px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.22,1,.36,1);z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{color:var(--ok);border-color:rgba(0,214,143,.3)}
.toast.err{color:var(--err);border-color:rgba(255,77,109,.3)}
.toast svg{width:14px;height:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.err-msg{font-size:12px;color:var(--err);margin-top:8px;text-align:center;display:none}
.err-msg.show{display:block}
</style>
</head>
<body>

<svg style="display:none">
  <!-- كل الـ symbols للأيقونات موجودة في الكود الأصلي، انسخها من هناك إذا أردت -->
  <!-- للاختصار حذفتها هنا، لكن يجب أن تبقى في الملف النهائي -->
</svg>

<div class="bg-grid"></div>
<div class="o1 orb"></div>
<div class="o2 orb"></div>

<!-- شاشة الاسم فقط -->
<div class="screen active" id="screenName">
  <div class="card">
    <img class="card-logo" src="https://plusedu.vercel.app/store/1/fonts/221.png" alt="Plus"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
    <div class="card-logo-fallback" style="display:none">➕</div>
    <h2>مرحباً بك في Plus</h2>
    <p class="subtitle">داش المشرف · أدخل اسمك للدخول</p>
    <div class="ff">
      <label>اسمك</label>
      <input type="text" id="inpName" placeholder="مثال: أحمد سالم" maxlength="40"
        onkeydown="if(event.key==='Enter') loginWithName()"/>
    </div>
    <button class="btn primary" onclick="loginWithName()">
      دخول
    </button>
    <div class="err-msg" id="nameErr">من فضلك أدخل اسمك</div>
  </div>
</div>

<!-- الداشبورد الرئيسي -->
<div id="app" style="display:none">
  <div class="topbar">
    <a href="#" class="tb-logo">
      <img src="https://plusedu.vercel.app/store/1/fonts/221.png" alt="Plus" onerror="this.style.display='none'"/>
      <h2>Plus Math</h2>
    </a>
    <div class="tb-name">مشرف: <strong id="tbName">—</strong></div>
    <div class="tb-acts">
      <button class="tbtn danger" onclick="doLogout()">
        <svg><use href="#i-out"/></svg>خروج
      </button>
    </div>
  </div>

  <div class="main">
    <div class="welcome-banner">
      <div class="wb-avatar" id="wbAvatar">م</div>
      <div class="wb-info">
        <h3 id="wbName">—</h3>
        <p>مشرف محتوى · Plus Mathematics</p>
      </div>
    </div>

    <!-- باقي المحتوى (الصفوف، التبويبات، نماذج الإضافة، القوائم) -->
    <!-- ضع هنا الكود الأصلي الخاص بـ stage-wrap + grade-header + tabs + sv + se + sh + كل النماذج -->
    <!-- إذا كنت لا تريد إعادة كتابته كله الآن، ابدأ بإضافة div بسيط للاختبار: -->
    <div style="padding:40px;text-align:center;color:#fff;font-size:24px;">
      مرحباً <span id="welcomeUser"></span>!<br>
      <p style="font-size:18px;margin-top:20px;">الداشبورد جاهز – أضف الصفوف والمحتوى هنا</p>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><svg id="tIc"><use href="#i-check"/></svg><span id="tMsg"></span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, addDoc, updateDoc, deleteDoc, setDoc, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2ziv39cpnOyyfamabO1ujhU-1CyIdRaE",
  authDomain: "plusinmath-web.firebaseapp.com",
  projectId: "plusinmath-web",
  storageBucket: "plusinmath-web.firebasestorage.app",
  messagingSenderId: "444492731461",
  appId: "1:444492731461:web:14529f08d9ccf047dabf2c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.db = db;
window.storage = storage;
window._fbReady = true;
</script>

<script>
// ──────────────── متغيرات عامة ────────────────
let currentUserName = '';

// ──────────────── دوال أساسية ────────────────
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  document.getElementById('tMsg').textContent = msg;
  document.getElementById('tIc').innerHTML = type === 'err' ? '<use href="#i-x"/>' : '<use href="#i-check"/>';
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function loginWithName() {
  const nameInput = document.getElementById('inpName');
  const name = nameInput.value.trim();

  if (!name) {
    document.getElementById('nameErr').classList.add('show');
    return;
  }

  document.getElementById('nameErr').classList.remove('show');

  currentUserName = name;
  localStorage.setItem('supervisorName', name);

  document.getElementById('tbName').textContent = name;
  document.getElementById('wbName').textContent = name;
  document.getElementById('wbAvatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('welcomeUser').textContent = name;

  document.getElementById('screenName').classList.remove('active');
  document.getElementById('app').style.display = 'block';

  toast('تم الدخول بنجاح يا ' + name, 'ok');
}

function doLogout() {
  localStorage.removeItem('supervisorName');
  currentUserName = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('screenName').classList.add('active');
  document.getElementById('inpName').value = '';
  toast('تم تسجيل الخروج', 'ok');
}

// ──────────────── التحميل التلقائي ────────────────
window.addEventListener('load', () => {
  const savedName = localStorage.getItem('supervisorName');
  if (savedName) {
    currentUserName = savedName;
    document.getElementById('tbName').textContent = savedName;
    document.getElementById('wbName').textContent = savedName;
    document.getElementById('wbAvatar').textContent = savedName.charAt(0).toUpperCase();
    document.getElementById('welcomeUser').textContent = savedName;

    document.getElementById('screenName').classList.remove('active');
    document.getElementById('app').style.display = 'block';
  }
});
</script>
</body>
</html>
