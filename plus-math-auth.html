<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plus Mathematics – تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #03050c;
    --card: rgba(10,15,35,0.82);
    --border: rgba(74,127,212,0.28);
    --border2: rgba(74,127,212,0.09);
    --blue: #5a8fe8;
    --navy: #0f2559;
    --gold: #d4b15a;
    --gold2: #f5d47a;
    --text: #f0f4ff;
    --muted: #8a9bc5;
    --error: #ff5c75;
    --success: #00e6a3;
    --input: rgba(6,10,25,0.88);
  }

  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

  body {
    min-height: 100vh;
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    overflow-x: hidden;
  }

  .bg-grid, .bg-mesh, .orb { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg-grid {
    background-image: 
      linear-gradient(rgba(74,127,212,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,127,212,0.035) 1px, transparent 1px);
    background-size: 70px 70px;
    opacity: 0.6;
  }
  .bg-mesh {
    background: radial-gradient(ellipse 75% 55% at 20% 30%, rgba(74,127,212,0.16) 0%, transparent 65%),
                radial-gradient(ellipse 65% 50% at 80% 70%, rgba(212,168,76,0.12) 0%, transparent 70%);
  }
  .orb1 { width: 520px; height: 520px; background: rgba(15,40,90,0.5); top: -180px; left: -200px; filter: blur(140px); }
  .orb2 { width: 420px; height: 420px; background: rgba(140,100,20,0.38); bottom: -140px; right: -100px; filter: blur(120px); }

  .wrapper { position: relative; z-index: 10; width: 100%; max-width: 460px; }

  .auth-card {
    background: var(--card);
    backdrop-filter: blur(32px);
    border: 1px solid var(--border);
    border-radius: 32px;
    box-shadow: 0 45px 100px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.07);
    overflow: hidden;
    animation: cardIn 0.8s cubic-bezier(0.23,1,0.32,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(50px) scale(0.94); }
    to   { opacity: 1; transform: none; }
  }

  .auth-header {
    padding: 40px 32px 24px;
    text-align: center;
    background: linear-gradient(180deg, rgba(26,50,112,0.35) 0%, transparent 100%);
  }

  .logo-img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    filter: drop-shadow(0 8px 24px rgba(74,127,212,0.75)) drop-shadow(0 0 36px rgba(212,168,76,0.35));
    animation: logoPulse 6s infinite ease-in-out;
  }

  @keyframes logoPulse {
    0%,100% { filter: drop-shadow(0 8px 24px rgba(74,127,212,0.75)) drop-shadow(0 0 36px rgba(212,168,76,0.35)); }
    50%     { filter: drop-shadow(0 10px 32px rgba(212,168,76,0.9)) drop-shadow(0 0 48px rgba(74,127,212,0.55)); }
  }

  h1 {
    font-size: 26px;
    font-weight: 900;
    margin: 20px 0 6px;
    background: linear-gradient(135deg, #ffffff 30%, var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .auth-header p {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 1.1px;
  }

  .auth-body { padding: 32px 28px 40px; }

  .tabs {
    display: flex;
    background: rgba(8,13,28,0.65);
    border-radius: 16px;
    padding: 5px;
    border: 1px solid var(--border2);
    margin-bottom: 28px;
  }

  .tab-btn {
    flex: 1;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.3s ease;
  }

  .tab-btn.active {
    background: linear-gradient(135deg, var(--blue), var(--navy));
    color: white;
    box-shadow: 0 5px 18px rgba(90,143,232,0.45);
  }

  .field { margin-bottom: 24px; }

  .field label {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.9px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  input, .phone-row {
    width: 100%;
    padding: 16px 18px;
    background: var(--input);
    border: 1.5px solid var(--border2);
    border-radius: 16px;
    color: white;
    font-size: 16px;
    transition: all 0.25s ease;
  }

  input:focus, .phone-row:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 5px rgba(90,143,232,0.22);
    outline: none;
  }

  .phone-prefix {
    background: rgba(74,127,212,0.12);
    border-left: 1px solid var(--border2);
    padding: 0 16px;
    font-weight: bold;
    color: var(--muted);
  }

  .btn {
    width: 100%;
    padding: 16px;
    font-size: 17px;
    font-weight: 800;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--blue), var(--navy));
    color: white;
    border: none;
    box-shadow: 0 8px 28px rgba(90,143,232,0.4);
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 38px rgba(90,143,232,0.55);
  }

  .btn-google {
    background: white;
    color: #222;
    border: 1px solid #ddd;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(0,0,0,0.14);
  }

  .btn-google svg { width: 24px; height: 24px; margin-left: 12px; }

  .btn-google:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.22); }

  .divider {
    display: flex;
    align-items: center;
    margin: 24px 0;
    color: var(--muted);
    font-size: 14px;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border2);
  }

  .divider span { margin: 0 16px; }

  .msg {
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 15px;
    margin: 16px 0;
    text-align: center;
    display: none;
  }

  .msg.show { display: block; }

  .msg.error { background: rgba(255,92,117,0.18); color: var(--error); border: 1px solid rgba(255,92,117,0.3); }
  .msg.success { background: rgba(0,230,163,0.18); color: var(--success); border: 1px solid rgba(0,230,163,0.3); }

  .card-footer {
    padding: 20px;
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--border2);
  }

  .card-footer a { color: var(--blue); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>

<!-- SVG symbols -->
<svg style="display:none">
  <!-- ... ضع هنا كل الـ <symbol> اللي كانت موجودة عندك (i-bell, i-check, i-x, i-arrow-r, i-key, i-wa) ... -->
</svg>

<div class="bg-grid"></div>
<div class="bg-mesh"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <img src="https://plusedu.vercel.app/store/1/fonts/221.png" alt="Plus" class="logo-img"
           onerror="this.src='https://plusinmath-web.firebasestorage.app/logo.png'"/>
      <h1>Plus Mathematics</h1>
      <p>منصة مراجعة الرياضيات · 2026</p>
    </div>

    <div class="auth-body">

      <div class="step active" id="step-auth">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
          <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
        </div>

        <!-- تسجيل الدخول -->
        <div id="tab-login">
          <div class="field">
            <label>رقم الهاتف أو الإيميل</label>
            <input type="text" id="login-identifier" placeholder="01xxxxxxxxx أو example@gmail.com"/>
          </div>
          <div class="field">
            <label>كلمة المرور</label>
            <input type="password" id="login-pass" placeholder="••••••••"/>
          </div>
          <div class="forgot"><a href="#" onclick="forgotPass()">نسيت كلمة المرور؟</a></div>
          <div class="msg" id="login-msg"></div>

          <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
            <span class="btn-text">دخول</span>
          </button>

          <div class="divider"><span>أو</span></div>

          <button class="btn btn-google" onclick="signInWithGoogle()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.51h5.84c-.25 1.31-.98 2.42-2.07 3.16v2.63h3.35c1.96-1.81 3.09-4.47 3.09-7.25z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-1.01 7.28-2.73l-3.35-2.63c-1.01.68-2.29 1.08-3.93 1.08-3.02 0-5.58-2.04-6.49-4.79H.96v2.67C2.77 20.39 6.62 23 12 23z"/><path fill="#FBBC05" d="M5.51 14.21c-.23-.68-.36-1.41-.36-2.21s.13-1.53.36-2.21V7.34H.96C.35 8.85 0 10.39 0 12s.35 3.15.96 4.66l4.55-2.45z"/><path fill="#EA4335" d="M12 4.98c1.64 0 3.11.56 4.27 1.66l3.19-3.19C17.46 1.01 14.97 0 12 0 6.62 0 2.77 2.61.96 6.34l4.55 2.45C6.42 6.02 8.98 4.98 12 4.98z"/></svg>
            الدخول بجوجل
          </button>

          <div class="divider"><span>أو</span></div>

          <a class="btn btn-wa" href="#" onclick="openWaRegister(event)">
            <svg><use href="#i-wa"/></svg>
            طلب حساب عبر واتساب
          </a>
        </div>

        <!-- إنشاء حساب -->
        <div id="tab-register" style="display:none">
          <div class="field">
            <label>الاسم الكامل</label>
            <input type="text" id="reg-name" placeholder="اسمك بالكامل"/>
          </div>

          <div class="field">
            <label>رقم الهاتف</label>
            <div class="phone-row">
              <div class="phone-prefix"><span class="code">+20</span></div>
              <input type="tel" class="phone-input" id="reg-phone" placeholder="1x xxx xxxx" maxlength="11"/>
            </div>
          </div>

          <div class="field">
            <label>الإيميل (اختياري)</label>
            <input type="email" id="reg-email" placeholder="example@gmail.com"/>
          </div>

          <div class="field">
            <label>كلمة المرور</label>
            <input type="password" id="reg-pass" placeholder="٨ أحرف على الأقل" minlength="8"/>
          </div>

          <div class="msg" id="reg-msg"></div>

          <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">
            <span class="btn-text">إنشاء حساب</span>
          </button>

          <div class="divider"><span>أو</span></div>

          <button class="btn btn-google" onclick="signInWithGoogle()">
            <svg viewBox="0 0 24 24">…</svg>
            إنشاء حساب بجوجل
          </button>
        </div>
      </div>

      <!-- STEP: كود الاشتراك -->
      <div class="step" id="step-code">
        <!-- محتوى خطوة الكود زي ما كان عندك -->
      </div>

      <!-- STEP: النجاح -->
      <div class="step" id="step-success">
        <!-- محتوى خطوة النجاح زي ما كان -->
      </div>

    </div>

    <div class="card-footer">
      <a href="index.html">الصفحة الرئيسية</a> ·
      بالاستمرار توافق على <a href="#">شروط الاستخدام</a>
    </div>
  </div>
</div>

<!-- Firebase و JavaScript هنا زي ما كان (doLogin, doRegister, forgotPass, signInWithGoogle, submitCode, ...) -->

</body>
</html>
