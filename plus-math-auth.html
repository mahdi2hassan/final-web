<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plus Mathematics – تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
  /* نفس الـ CSS السابق بدون تغيير كبير، فقط إضافة للـ select */
  select {
    width: 100%; padding: 13px 14px; background: var(--input);
    border: 1.5px solid var(--border2); border-radius: 12px;
    color: var(--text); font-size: 15px; font-family: 'Tajawal', sans-serif;
  }
  select:focus { border-color: var(--blue); outline: none; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- SVG symbols نفسها -->

<div class="wrapper">
<div class="auth-card">

  <div class="auth-header">
    <img src="https://plusedu.vercel.app/store/1/fonts/221.png" alt="Plus" class="logo-img" onerror="this.src='https://plusinmath-web.firebasestorage.app/logo.png'"/>
    <h1>Plus Mathematics</h1>
    <p>منصة مراجعة الرياضيات · 2026</p>
  </div>

  <div class="auth-body">

    <div class="step active" id="step-auth">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
      </div>

      <!-- تسجيل الدخول -->
      <div id="tab-login">
        <div class="field">
          <label>نوع الحساب</label>
          <select id="login-type" onchange="toggleLoginFields()">
            <option value="phone">رقم الهاتف</option>
            <option value="email">البريد الإلكتروني</option>
          </select>
        </div>
        <div class="field" id="login-phone-field">
          <label>رقم الهاتف</label>
          <div class="phone-row">
            <div class="phone-prefix">+20</div>
            <input type="tel" id="login-phone" placeholder="1x xxx xxxx" maxlength="11"/>
          </div>
        </div>
        <div class="field hidden" id="login-email-field">
          <label>البريد الإلكتروني</label>
          <input type="email" id="login-email" placeholder="example@gmail.com"/>
        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <input type="password" id="login-pass" placeholder="••••••••"/>
        </div>
        <div class="forgot"><a href="#" onclick="forgotPass()">نسيت كلمة المرور؟</a></div>
        <div class="msg" id="login-msg"></div>

        <button class="btn" onclick="doLogin()">دخول</button>

        <div class="divider">أو</div>
        <button class="btn btn-google" onclick="signInWithGoogle()">الدخول بجوجل</button>
      </div>

      <!-- إنشاء حساب -->
      <div id="tab-register" style="display:none">
        <div class="field">
          <label>نوع الحساب</label>
          <select id="reg-type" onchange="toggleRegFields()">
            <option value="phone">بالرقم فقط</option>
            <option value="email">بالإيميل فقط</option>
          </select>
        </div>

        <div id="reg-phone-section">
          <div class="field">
            <label>الاسم الكامل</label>
            <input type="text" id="reg-name" placeholder="اسمك بالكامل"/>
          </div>
          <div class="field">
            <label>رقم الهاتف</label>
            <div class="phone-row">
              <div class="phone-prefix">+20</div>
              <input type="tel" id="reg-phone" placeholder="1x xxx xxxx" maxlength="11"/>
            </div>
          </div>
        </div>

        <div id="reg-email-section" class="hidden">
          <div class="field">
            <label>الاسم الكامل</label>
            <input type="text" id="reg-name-email" placeholder="اسمك بالكامل"/>
          </div>
          <div class="field">
            <label>البريد الإلكتروني</label>
            <input type="email" id="reg-email" placeholder="example@gmail.com"/>
          </div>
        </div>

        <div class="field">
          <label>كلمة المرور</label>
          <input type="password" id="reg-pass" placeholder="٨ أحرف على الأقل" minlength="8"/>
        </div>
        <div class="msg" id="reg-msg"></div>

        <button class="btn" onclick="doRegister()">إنشاء حساب</button>

        <div class="divider">أو</div>
        <button class="btn btn-google" onclick="signInWithGoogle()">إنشاء حساب بجوجل</button>
      </div>
    </div>

    <!-- step-code و step-success نفسها بدون تغيير -->

  </div>
</div>
</div>

<script type="module">
  // imports نفسها + signInWithRedirect, getRedirectResult إلخ

  // ... باقي الإعدادات (app, auth, db, onAuthStateChanged, loadBanner, loadPrice ...)

  function toggleLoginFields() {
    const type = document.getElementById('login-type').value;
    document.getElementById('login-phone-field').classList.toggle('hidden', type !== 'phone');
    document.getElementById('login-email-field').classList.toggle('hidden', type !== 'email');
  }

  function toggleRegFields() {
    const type = document.getElementById('reg-type').value;
    document.getElementById('reg-phone-section').classList.toggle('hidden', type !== 'phone');
    document.getElementById('reg-email-section').classList.toggle('hidden', type !== 'email');
  }

  // تسجيل الدخول
  window.doLogin = async () => {
    const type = document.getElementById('login-type').value;
    const pass = document.getElementById('login-pass').value.trim();
    let identifier = '';

    if (type === 'phone') {
      const phone = document.getElementById('login-phone').value.trim().replace(/\D/g, '');
      if (phone.length < 10) return showMsg('login-msg', 'رقم هاتف غير صحيح', 'error');
      identifier = '20' + (phone.startsWith('0') ? phone.slice(1) : phone) + '@plusinmath.edu';
    } else {
      identifier = document.getElementById('login-email').value.trim();
      if (!identifier.includes('@')) return showMsg('login-msg', 'إيميل غير صحيح', 'error');
    }

    if (!pass) return showMsg('login-msg', 'ادخل كلمة المرور', 'error');

    try {
      await signInWithEmailAndPassword(auth, identifier, pass);
      // onAuthStateChanged هيعمل التوجيه
    } catch (e) {
      showMsg('login-msg', 'بيانات خاطئة أو الحساب غير موجود', 'error');
      console.error(e);
    }
  };

  // إنشاء حساب
  window.doRegister = async () => {
    const type = document.getElementById('reg-type').value;
    const name = (type === 'phone' ? document.getElementById('reg-name') : document.getElementById('reg-name-email')).value.trim();
    const pass = document.getElementById('reg-pass').value.trim();

    if (!name) return showMsg('reg-msg', 'ادخل الاسم', 'error');
    if (pass.length < 8) return showMsg('reg-msg', 'كلمة مرور قصيرة', 'error');

    let email = '';

    if (type === 'phone') {
      const phone = document.getElementById('reg-phone').value.trim().replace(/\D/g, '');
      if (phone.length < 10) return showMsg('reg-msg', 'رقم هاتف غير صحيح', 'error');
      email = '20' + (phone.startsWith('0') ? phone.slice(1) : phone) + '@plusinmath.edu';
    } else {
      email = document.getElementById('reg-email').value.trim();
      if (!email.includes('@')) return showMsg('reg-msg', 'إيميل غير صحيح', 'error');
    }

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, 'users', cred.user.uid), {
        name,
        [type === 'phone' ? 'phone' : 'email']: type === 'phone' ? phone : email,
        createdAt: serverTimestamp(),
        subscriptionActive: false
      });
      showMsg('reg-msg', 'تم إنشاء الحساب بنجاح', 'success');
      // onAuthStateChanged هيوجه لـ step-code
    } catch (e) {
      let msg = 'خطأ في الإنشاء';
      if (e.code === 'auth/email-already-in-use') msg = 'الحساب موجود بالفعل';
      showMsg('reg-msg', msg, 'error');
      console.error(e);
    }
  };

  // إعادة تعيين كلمة السر (النسخة المحسنة)
  window.forgotPass = async () => {
    const type = document.getElementById('login-type').value;
    let identifier = '';

    if (type === 'phone') {
      const phone = document.getElementById('login-phone').value.trim().replace(/\D/g, '');
      if (phone.length < 10) return showMsg('login-msg', 'ادخل رقم هاتف صحيح أولاً', 'error');
      identifier = '20' + (phone.startsWith('0') ? phone.slice(1) : phone) + '@plusinmath.edu';
    } else {
      identifier = document.getElementById('login-email').value.trim();
      if (!identifier.includes('@')) return showMsg('login-msg', 'ادخل إيميل صحيح أولاً', 'error');
    }

    try {
      await sendPasswordResetEmail(auth, identifier);
      showMsg('login-msg', 'تم إرسال رابط إعادة التعيين (تأكد من السبام أيضًا)', 'success');
    } catch (e) {
      console.error('Reset error:', e);
      let msg = 'فشل إرسال الرابط';
      if (e.code === 'auth/user-not-found') msg = 'الحساب غير موجود';
      if (e.code === 'auth/invalid-email') msg = 'إيميل/رقم غير صحيح';
      showMsg('login-msg', msg + ' — لو بالرقم فقط، تواصل مع الدعم عبر واتساب', 'error');
    }
  };

  // باقي الدوال (signInWithGoogle, submitCode, ...) نفسها مع getRedirectResult

  // استدعاء الـ toggle أول مرة
  toggleLoginFields();
  toggleRegFields();
</script>

<!-- باقي الـ script العادي للـ UI helpers -->
</body>
</html>
