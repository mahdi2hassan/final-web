<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plus Mathematics – تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #03050c;
      --card: rgba(10,15,35,0.78);
      --border: rgba(74,127,212,0.25);
      --border2: rgba(74,127,212,0.08);
      --blue: #5a8fe8;
      --navy: #0f2559;
      --gold: #d4b15a;
      --gold2: #f5d47a;
      --text: #f0f4ff;
      --muted: #7a8bb5;
      --error: #ff5c75;
      --success: #00e6a3;
      --input: rgba(6,10,25,0.85);
    }

    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

    body {
      min-height: 100vh;
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }

    .wrapper {
      width: 100%;
      max-width: 460px;
    }

    .auth-card {
      background: var(--card);
      backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 40px 90px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
      overflow: hidden;
      animation: cardIn 0.7s ease-out;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }

    .auth-card:hover {
      box-shadow: 0 50px 110px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: box-shadow 0.4s;
    }

    .auth-header {
      padding: 32px 28px 20px;
      text-align: center;
    }

    .logo-img {
      width: 80px;
      height: 80px;
      animation: logoPulse 5s infinite ease-in-out;
    }

    @keyframes logoPulse {
      0%, 100% { filter: drop-shadow(0 6px 20px rgba(74,127,212,0.7)) drop-shadow(0 0 30px rgba(201,168,76,0.3)); }
      50%      { filter: drop-shadow(0 8px 28px rgba(201,168,76,0.8)) drop-shadow(0 0 40px rgba(74,127,212,0.45)); }
    }

    h1 {
      font-size: 22px;
      font-weight: 900;
      margin: 16px 0 4px;
      background: linear-gradient(135deg, #fff 30%, var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-body { padding: 0 26px 32px; }

    .btn {
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--navy));
      color: white;
      border: none;
      box-shadow: 0 6px 24px rgba(74,127,212,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(74,127,212,0.5);
    }

    .btn-google {
      background: white;
      color: #333;
      border: 1px solid #e0e0e0;
      font-weight: 600;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }

    .btn-google svg {
      margin-left: 10px;
      width: 22px;
      height: 22px;
      vertical-align: middle;
    }

    .btn-google:hover {
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    input {
      width: 100%;
      padding: 15px 16px;
      background: var(--input);
      border: 1.5px solid var(--border2);
      border-radius: 14px;
      color: white;
      font-size: 16px;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(90,143,232,0.18);
      outline: none;
    }

    .msg {
      padding: 12px;
      border-radius: 10px;
      margin: 12px 0;
      text-align: center;
      font-size: 14px;
    }

    .msg.error { background: rgba(255,92,117,0.15); color: var(--error); }
    .msg.success { background: rgba(0,230,163,0.15); color: var(--success); }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <img src="https://plusedu.vercel.app/store/1/fonts/221.png" class="logo-img" alt="Plus Mathematics" />
      <h1>Plus Mathematics</h1>
      <p>منصة مراجعة الرياضيات 2026</p>
    </div>

    <div class="auth-body">
      <div class="field">
        <label>الإيميل أو رقم الهاتف</label>
        <input type="text" placeholder="example@email.com أو 01xxxxxxxxx" />
      </div>

      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" placeholder="••••••••" />
      </div>

      <button class="btn btn-primary">تسجيل الدخول</button>

      <div style="text-align:center; margin:20px 0; color:#aaa;">أو</div>

      <button class="btn btn-google">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.51h5.84c-.25 1.31-.98 2.42-2.07 3.16v2.63h3.35c1.96-1.81 3.09-4.47 3.09-7.25z"/></svg>
        الدخول بجوجل
      </button>
    </div>
  </div>
</div>

</body>
</html>
