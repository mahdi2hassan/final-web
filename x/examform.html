<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امتحان حصة - رياضيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0c2340;
            --accent-blue: #1d72b8;
            --light-blue: #eef6ff;
            --gold: #f39c12;
            --gold-light: #fef9e7;
            --border-color: #0c2340;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ورقة الامتحان A4 */
        .page {
            width: 210mm;
            min-height: 297mm;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* الرموز الرياضية التزيينية في الخلفية */
        .math-bg {
            position: absolute;
            font-weight: bold;
            color: rgba(12, 35, 64, 0.05);
            user-select: none;
            z-index: 0;
        }
        .bg-1 { top: 20px; left: 30px; font-size: 28px; }
        .bg-2 { top: 120px; left: 20px; font-size: 22px; }
        .bg-3 { bottom: 80px; left: 30px; font-size: 32px; }
        .bg-4 { bottom: 120px; right: 40px; font-size: 20px; }

        .content-wrap {
            position: relative;
            z-index: 1;
        }

        /* ----- 1. الجزء العلوي (الهيدر) ----- */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* كارت إعداد المعلم */
        .teacher-card {
            border: 2px solid var(--accent-blue);
            border-radius: 15px;
            padding: 8px 15px;
            text-align: center;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-width: 140px;
        }
        .teacher-card .badge {
            background: var(--gold);
            color: #fff;
            padding: 2px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 4px;
        }
        .teacher-card .name {
            color: var(--primary-blue);
            font-weight: 800;
            font-size: 15px;
        }
        .teacher-card .subject {
            color: var(--accent-blue);
            font-size: 12px;
            font-weight: 700;
            border-top: 1px solid #eee;
            margin-top: 4px;
            padding-top: 2px;
        }

        /* عنوان الامتحان الرئيسي */
        .main-title-box {
            background: radial-gradient(circle, #1d5b96 0%, var(--primary-blue) 100%);
            color: #fff;
            padding: 10px 35px;
            border-radius: 25px;
            text-align: center;
            border: 3px solid #64b5f6;
            box-shadow: 0 5px 15px rgba(12, 35, 64, 0.2);
            position: relative;
        }
        .main-title-box h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }
        .main-title-box .num-box {
            background: #fff;
            color: var(--primary-blue);
            display: inline-block;
            padding: 0 15px;
            border-radius: 8px;
            margin: 2px 0;
            font-weight: bold;
        }
        .main-title-box .sub-text {
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 15px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 4px;
            display: inline-block;
        }

        /* شريط بيانات الطالب */
        .student-info-bar {
            border: 2px solid var(--accent-blue);
            background-color: var(--light-blue);
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-blue);
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dots-line {
            border-bottom: 2px dotted #888;
            display: inline-block;
            flex-grow: 1;
            min-width: 80px;
            height: 12px;
        }
        .score-box {
            background: #fff;
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            padding: 2px 10px;
            color: var(--gold);
            font-weight: 800;
        }

        /* ----- 2. صناديق الأسئلة ----- */
        .question-card {
            border-radius: 20px;
            position: relative;
            margin-bottom: 20px;
            padding: 35px 20px 20px 20px;
            background: #fff;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* السؤال الأول (أزرق) */
        .q-blue {
            border: 2.5px solid var(--accent-blue);
            box-shadow: 0 4px 10px rgba(29, 114, 184, 0.08);
        }
        .q-blue .q-header {
            background: linear-gradient(135deg, #1d72b8, var(--primary-blue));
        }

        /* السؤال الثاني (ذهبي) */
        .q-gold {
            border: 2.5px solid var(--gold);
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.08);
        }
        .q-gold .q-header {
            background: linear-gradient(135deg, #f39c12, #d35400);
        }

        /* شريط عنوان السؤال المتداخل في الأعلى */
        .q-header {
            position: absolute;
            top: -18px;
            right: 50%;
            transform: translateX(50%);
            color: #fff;
            padding: 4px 25px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        .q-circle {
            background: #fff;
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            font-weight: 900;
        }

        /* خانة الدرجة أسفل السؤال */
        .q-score-bottom {
            align-self: flex-start;
            border: 1.5px solid var(--gold);
            background: var(--gold-light);
            padding: 3px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-blue);
        }

        /* ----- 3. الفوتر ----- */
        .footer-banner {
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-blue), var(--primary-blue));
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* إعدادات الطباعة */
        @media print {
            body {
                background: none;
                padding: 0;
            }
            .page {
                box-shadow: none;
                border-radius: 0;
                width: 100%;
                height: 100vh;
            }
        }
    </style>
</head>
<body>

    <div class="page">
        <!-- رموز خلفية رياضية -->
        <div class="math-bg bg-1">f(x) = x²</div>
        <div class="math-bg bg-2">a² + b² = c²</div>
        <div class="math-bg bg-3">√x</div>
        <div class="math-bg bg-4">π</div>

        <div class="content-wrap">
            <!-- 1. الرأس والهيدر -->
            <div class="header-top">
                <!-- شفرة بيانية يسار (مثال لمعادلة) -->
                <div style="font-weight: bold; color: var(--accent-blue); font-size: 14px;">
                    f(x) = x²
                </div>

                <!-- العنوان الرئيسي -->
                <div class="main-title-box">
                    <h1>امتحان</h1>
                    <div>حصة رقم <span class="num-box">&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
                    <div class="sub-text">المادة: الرياضيات</div>
                </div>

                <!-- كارت المعلم -->
                <div class="teacher-card">
                    <span class="badge">إعداد</span>
                    <div class="name">مهدي حسن</div>
                    <div class="subject">المادة: الرياضيات</div>
                </div>
            </div>

            <!-- شريط بيانات الطالب -->
            <div class="student-info-bar">
                <div class="info-item">
                    <span>👤 اسم الطالب:</span>
                    <span class="dots-line" style="min-width: 140px;"></span>
                </div>
                <div class="info-item">
                    <span>🎓 الصف:</span>
                    <span class="dots-line" style="min-width: 80px;"></span>
                </div>
                <div class="info-item">
                    <span>📅 التاريخ:</span>
                    <span>20 &nbsp; / &nbsp;&nbsp;&nbsp;&nbsp; /</span>
                </div>
                <div class="info-item">
                    <span>⭐ الدرجة الكلية:</span>
                    <span class="score-box">&nbsp;&nbsp;&nbsp;&nbsp; / &nbsp;&nbsp;&nbsp;&nbsp;</span>
                </div>
            </div>

            <!-- 2. منطقة الأسئلة -->

            <!-- السؤال الأول -->
            <div class="question-card q-blue">
                <div class="q-header">
                    <span class="q-circle">1</span>
                    <span>💡 السؤال الأول</span>
                </div>
                
                <!-- نص السؤال يكتب هنا -->
                <div class="q-body">
                    <!-- يمكنك كتابة السؤال هنا -->
                </div>

                <div class="q-score-bottom">
                    ⭐ الدرجة: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                </div>
            </div>

            <!-- السؤال الثاني -->
            <div class="question-card q-gold">
                <div class="q-header">
                    <span class="q-circle">2</span>
                    <span>π السؤال الثاني</span>
                </div>

                <!-- نص السؤال يكتب هنا -->
                <div class="q-body">
                    <!-- يمكنك كتابة السؤال هنا -->
                </div>

                <div class="q-score-bottom">
                    ⭐ الدرجة: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                </div>
            </div>
        </div>

        <!-- 3. الفوتر -->
        <div class="footer-banner">
            ⭐ بالتوفيق والنجاح للجميع ⭐
        </div>
    </div>

</body>
</html>
