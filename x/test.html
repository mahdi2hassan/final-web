<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سبورة بلس - Smart Board Plus</title>
    <!-- استدعاء خط عربي أصيل ورائع (Amiri + Aref Ruqaa) -->
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Cairo:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* الهيدر والعنوان */
        .header {
            background: #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px;
            border-bottom: 2px solid #333;
        }
        .brand {
            font-size: 22px;
            font-weight: bold;
            color: #ffca28; /* لون ذهبي جذاب */
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* شريط الأدوات */
        .toolbar {
            background-color: #1a1a1a;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .tool-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #2a2a2a;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #3d3d3d;
        }
        label {
            font-size: 13px;
            white-space: nowrap;
            color: #ccc;
        }
        button, input[type="file"] {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            background: #3a3a3a;
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s;
        }
        button:hover {
            background: #4a4a4a;
        }
        button.active {
            background: #ffca28;
            color: #000;
            font-weight: bold;
        }
        input[type="color"] {
            padding: 0;
            width: 32px;
            height: 28px;
            border: none;
            cursor: pointer;
            background: transparent;
        }
        /* منطقة اللوحة السوداء */
        .canvas-container {
            flex: 1;
            position: relative;
            background-color: #000000; /* خلفية سوداء ناصعة */
            cursor: crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- الشريط العلوي -->
    <div class="header">
        <div class="brand">
            ✨ سبورة بلس <span>(+)</span>
        </div>
        <div style="font-size: 12px; color: #888;">السبورة الذكية التفاعلية للمعلّم</div>
    </div>

    <!-- شريط الأدوات -->
    <div class="toolbar">
        <!-- الأقلام -->
        <div class="tool-group">
            <button id="btnDraw" class="active">✍️ رسم/كتابة حرة</button>
            <button id="btnText">✒️ قلم الخط العربي (اضغط للطباعة)</button>
            <button id="btnHighlight">🖍️ قلم تمييز</button>
            <button id="btnErase">🧹 ممحاة</button>
        </div>

        <!-- الألوان والسُمْك -->
        <div class="tool-group">
            <label>اللون:</label>
            <input type="color" id="colorPicker" value="#ffffff"> <!-- الافتراضي أبيض للشاشة السوداء -->
            <label>الحجم:</label>
            <input type="range" id="lineWidth" min="1" max="60" value="4">
        </div>

        <!-- إدراج صور -->
        <div class="tool-group">
            <label for="imageLoader">📷 صورة:</label>
            <input type="file" id="imageLoader" accept="image/*" style="width: 170px;">
        </div>

        <!-- الأزرار الرئيسية -->
        <div class="tool-group">
            <button id="btnClear" style="background: #c0392b; color: #fff;">🗑️ مسح الكل</button>
            <button id="btnSave" style="background: #27ae60; color: #fff;">💾 حفظ اللوحة</button>
        </div>
    </div>

    <!-- منطقة السبورة -->
    <div class="canvas-container" id="container">
        <canvas id="board"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');

        let isDrawing = false;
        let currentMode = 'draw'; 
        let startX, startY;

        function resizeCanvas() {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);

            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            // إعادة تعبئة الخلفية باللون الأسود
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tempCanvas, 0, 0);
        }

        window.addEventListener('resize', resizeCanvas);
        
        // ضبط الأبعاد المبدئية
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // وضعيات الأزرار
        const buttons = {
            draw: document.getElementById('btnDraw'),
            text: document.getElementById('btnText'),
            highlight: document.getElementById('btnHighlight'),
            erase: document.getElementById('btnErase')
        };

        function setMode(mode) {
            currentMode = mode;
            Object.keys(buttons).forEach(key => {
                buttons[key].classList.toggle('active', key === mode);
            });
        }

        buttons.draw.onclick = () => setMode('draw');
        buttons.text.onclick = () => setMode('text');
        buttons.highlight.onclick = () => setMode('highlight');
        buttons.erase.onclick = () => setMode('erase');

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            const pos = getPos(e);
            startX = pos.x;
            startY = pos.y;

            if (currentMode === 'text') {
                addArabicText(startX, startY);
                return;
            }

            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            const color = document.getElementById('colorPicker').value;
            const size = document.getElementById('lineWidth').value;

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentMode === 'draw') {
                ctx.globalAlpha = 1.0;
                ctx.strokeStyle = color;
                ctx.lineWidth = size;
            } else if (currentMode === 'highlight') {
                ctx.globalAlpha = 0.35; // شفافية للتظليل
                ctx.strokeStyle = color;
                ctx.lineWidth = size * 3;
            } else if (currentMode === 'erase') {
                ctx.globalAlpha = 1.0;
                ctx.strokeStyle = '#000000'; // المسح باللون الأسود
                ctx.lineWidth = size * 4;
            }

            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            if (isDrawing) {
                ctx.closePath();
                isDrawing = false;
            }
        }

        // أحداث الماوس واللمس
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => { startDrawing(e); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); });
        canvas.addEventListener('touchend', stopDrawing);

        // إضافة النص بالخط العربي
        function addArabicText(x, y) {
            const text = prompt("اكتب النص المراد تحويله لخط عربي جميل:");
            if (text) {
                const color = document.getElementById('colorPicker').value;
                const size = document.getElementById('lineWidth').value;
                
                ctx.globalAlpha = 1.0;
                // استخدام خط 'Aref Ruqaa' العربي الأصيل
                ctx.font = `${parseInt(size) * 6 + 24}px 'Aref Ruqaa', serif`;
                ctx.fillStyle = color;
                ctx.fillText(text, x, y);
            }
        }

        // إدراج الصور
        document.getElementById('imageLoader').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    ctx.globalAlpha = 1.0;
                    let width = img.width;
                    let height = img.height;
                    const maxDim = 350;
                    if (width > maxDim || height > maxDim) {
                        if (width > height) {
                            height = (maxDim / width) * height;
                            width = maxDim;
                        } else {
                            width = (maxDim / height) * width;
                            height = maxDim;
                        }
                    }
                    ctx.drawImage(img, (canvas.width - width) / 2, (canvas.height - height) / 2, width, height);
                }
                img.src = event.target.result;
            }
            if(e.target.files[0]) {
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // مسح السبورة
        document.getElementById('btnClear').onclick = () => {
            if (confirm("هل تريد مسح محتويات سبورة بلس بالكامل؟")) {
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        };

        // حفظ اللوحة
        document.getElementById('btnSave').onclick = () => {
            const link = document.createElement('a');
            link.download = 'board-plus-export.png';
            link.href = canvas.toDataURL();
            link.click();
        };
    </script>
</body>
</html>
