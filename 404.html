<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>الصفحة غير موجودة — Plus Mathematics</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04060f;--blue:#4a7fd4;--navy:#1a3270;--gold:#c9a84c;--gold2:#f0d080;--text:#eef2ff;--muted:#6a7a9e}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;
  display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(74,127,212,0.04)1px,transparent 1px),linear-gradient(90deg,rgba(74,127,212,0.04)1px,transparent 1px);background-size:44px 44px}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none}
.o1{width:500px;height:500px;background:rgba(26,50,112,0.4);top:-200px;right:-150px}
.o2{width:350px;height:350px;background:rgba(110,75,10,0.3);bottom:-100px;left:-80px}
.card{position:relative;z-index:1;text-align:center;max-width:420px;width:100%}
.num{font-size:clamp(80px,20vw,130px);font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--blue),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.emoji{font-size:48px;margin:8px 0;display:block}
h1{font-size:22px;font-weight:900;margin-bottom:8px}
p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:11px 22px;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s;border:none;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;box-shadow:0 6px 20px rgba(74,127,212,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(74,127,212,0.4)}
.btn-ghost{background:transparent;border:1px solid rgba(74,127,212,0.3);color:var(--muted)}
.btn-ghost:hover{border-color:var(--blue);color:var(--text)}
.suggestions{margin-top:28px;padding:16px;background:rgba(74,127,212,0.05);border:1px solid rgba(74,127,212,0.15);border-radius:14px;text-align:right}
.suggestions h3{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:10px;text-align:center}
.sug-link{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;text-decoration:none;color:var(--text);font-size:13px;font-weight:600;transition:background .2s}
.sug-link:hover{background:rgba(74,127,212,0.1)}
.sug-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.countdown-r{font-size:12px;color:var(--muted);margin-top:20px}
#cd{color:var(--gold2);font-weight:800}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="o1 orb"></div>
<div class="o2 orb"></div>
<div class="card">
  <div class="num">404</div>
  <span class="emoji">🧮</span>
  <h1>الصفحة مش موجودة</h1>
  <p>يبدو إن الرابط اللي دخلت عليه غلط أو الصفحة اتحذفت.<br/>هرجعك للصفحة الرئيسية تلقائياً.</p>
  <div class="btns">
    <a href="index.html" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      الصفحة الرئيسية
    </a>
    <a href="courses.html" class="btn btn-ghost">كورساتي</a>
  </div>
  <div class="suggestions">
    <h3>ربما تبحث عن:</h3>
    <a href="courses.html" class="sug-link"><div class="sug-ico">📚</div>الكورسات والدروس</a>
    <a href="plus-math-auth.html" class="sug-link"><div class="sug-ico">🔑</div>تسجيل الدخول</a>
    <a href="books.html" class="sug-link"><div class="sug-ico">📖</div>متجر الكتب</a>
    <a href="https://wa.me/+201007586279" target="_blank" class="sug-link"><div class="sug-ico">💬</div>تواصل مع المدرس</a>
  </div>
  <div class="countdown-r">هيتم التحويل خلال <span id="cd">5</span> ثواني</div>
</div>
<script>
let n=5;
const cd=document.getElementById('cd');
const iv=setInterval(()=>{n--;cd.textContent=n;if(n<=0){clearInterval(iv);window.location.href='index.html';}},1000);
</script>
</body>
</html>
